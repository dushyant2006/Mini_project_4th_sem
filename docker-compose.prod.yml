version: "3.8"

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-local}/backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: backend
    ports:
      - "8000:8000"
    depends_on:
      - kafka
      - postgres
      - redis

       
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-incidents}
      - REDIS_URL=redis://${REDIS_HOST:-redis}:6379
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}      

  dashboard:
    image: ghcr.io/${GITHUB_REPOSITORY:-local}/dashboard:latest
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
